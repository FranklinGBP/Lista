<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista bebé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="tag">Lista compartida</p>
        <h1>Lista para el bebé</h1>
        <p class="subtitle">Reserva lo que quieras comprar para evitar duplicados.</p>
      </div>
      <button class="share" id="shareButton">Compartir</button>
    </header>

    <section class="summary" aria-label="Resumen de la lista">
      <article>
        <strong id="totalItems">0</strong>
        <span>Total</span>
      </article>
      <article>
        <strong id="pendingItems">0</strong>
        <span>Pendientes</span>
      </article>
      <article>
        <strong id="reservedItems">0</strong>
        <span>Cogidos</span>
      </article>
    </section>

    <nav class="filters" id="filters" aria-label="Filtros">
      <button class="filter active" data-filter="todos">Todos</button>
      <button class="filter" data-filter="pendiente">Pendientes</button>
      <button class="filter" data-filter="reservado">Cogidos</button>
      <button class="filter" data-filter="imprescindible">Imprescindibles</button>
    </nav>

    <p class="sync-status" id="syncStatus">Cargando lista...</p>

    <section id="lista" class="list" aria-live="polite"></section>
  </main>

  <template id="itemTemplate">
    <article class="card">
      <div class="card-top">
        <span class="category"></span>
        <span class="priority"></span>
      </div>
      <h2></h2>
      <p class="description"></p>
      <p class="reserved-by" hidden></p>

      <div class="actions">
        <a class="buy-link" href="#" target="_blank" rel="noopener noreferrer">Ver compra</a>
        <button class="reserve-button">Reservar</button>
      </div>

      <label class="name-field">
        Tu nombre
        <input type="text" placeholder="Ej. Franklin" />
      </label>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="links.js"></script>
  <script src="script.js"></script>
</body>
</html>
