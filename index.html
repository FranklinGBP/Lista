<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lista de regalos</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f7f1;--ink:#2a3a2e;--muted:#6c7b6f;--card:#fff;--sage:#5f8d6b;--soft:#e2ede3;--line:#dfe7dd;--danger:#a14224;--r:18px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:'Nunito Sans',system-ui,sans-serif}.wrap{max-width:900px;margin:auto;padding:26px 16px 70px}h1,h2,h3{font-family:'Baloo 2',cursive;line-height:1.1;margin:0}.eyebrow{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:#3e6b4c;font-weight:800}.sub{color:var(--muted);max-width:54ch}.posts{display:grid;gap:12px;margin:22px 0}.post,.gift,.modal{background:var(--card);border:1px solid var(--line);border-radius:var(--r)}.post{border-left:5px solid var(--sage);padding:14px 16px}.post h3{color:#3e6b4c;font-size:1.08rem}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}.gift{position:relative;overflow:hidden;display:flex;flex-direction:column}.gift.done{opacity:.7}.photo,.nophoto{width:100%;height:145px;background:var(--soft);object-fit:cover}.nophoto{display:grid;place-items:center;font-size:2.2rem}.body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}.desc{color:var(--muted);font-size:.92rem}.meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.tag{background:var(--soft);color:#3e6b4c;border-radius:999px;padding:3px 10px;font-size:.8rem;font-weight:800}.link{color:#3e6b4c;font-weight:800;text-decoration:none}.slots{display:flex;gap:4px}.slots span{flex:1;height:9px;border-radius:10px;background:var(--soft)}.slots .f{background:var(--sage)}.small{font-size:.82rem;color:var(--muted);font-weight:700}.reserve{margin-top:auto;background:var(--sage);color:#fff;border:0;border-radius:12px;padding:11px;font:800 1rem 'Baloo 2';cursor:pointer}.reserve:disabled{background:var(--line);color:var(--muted)}.ribbon{position:absolute;top:13px;right:-38px;transform:rotate(38deg);background:var(--ink);color:#fff;font-size:.72rem;font-weight:900;padding:4px 42px}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 14px}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;color:var(--muted);font-weight:800}.chip.on{background:var(--sage);color:#fff}.loading,.empty,footer{text-align:center;color:var(--muted);padding:42px 0}.overlay{position:fixed;inset:0;background:rgba(42,58,46,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:5}.overlay.open{display:flex}.modal{max-width:430px;width:100%;padding:22px}.field{margin:12px 0}.field label{display:block;font-size:.85rem;font-weight:800;margin-bottom:4px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit}.actions{display:flex;gap:10px}.actions button{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line);background:#fff;font:800 1rem 'Baloo 2'}.actions .primary{background:var(--sage);border-color:var(--sage);color:#fff}.msg{display:none;font-weight:800;margin-top:10px}.msg.err{display:block;color:var(--danger)}.msg.ok{display:block;color:#3e6b4c}footer a{color:inherit}
</style>
</head>
<body>
<div class="wrap">
<header><div class="eyebrow">Lista de regalos</div><h1>🎁 Nuestra lista</h1><p class="sub">Elige un regalo y resérvalo para que nadie lo repita. Solo el organizador verá tu nombre.</p></header>
<section class="posts" id="posts"></section><div class="filters" id="filters"></div><div class="loading" id="loading">Cargando la lista…</div><section class="grid" id="grid"></section><div class="empty" id="empty" style="display:none">Todavía no hay regalos publicados.</div><footer><a href="admin.html">Acceso organizador</a></footer>
</div>
<div class="overlay" id="overlay"><div class="modal"><h2 id="mTitle">Reservar regalo</h2><p class="sub">Tu nombre solo lo verá el organizador.</p><div class="field"><label>Tu nombre *</label><input id="fName" maxlength="80"></div><div class="field"><label>Teléfono o email opcional</label><input id="fContact" maxlength="120"></div><div class="field" id="slotsField" style="display:none"><label>Participaciones</label><select id="fSlots"></select></div><div class="field"><label>Nota opcional</label><textarea id="fNote" rows="2" maxlength="300"></textarea></div><div class="actions"><button id="btnCancel">Cancelar</button><button class="primary" id="btnConfirm">Reservar</button></div><div class="msg" id="mMsg"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://fporcsfrkknekpkhekur.supabase.co";
const SUPABASE_KEY="sb_publishable_dAC--LaF0m3ofm_HGBpp4Q_cHhlKOez";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let items=[],currentFilter="todos",currentItem=null;
const esc=s=>(s??"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
async function load(){document.getElementById("loading").style.display="block";const [posts,gifts]=await Promise.all([sb.from("gift_posts").select("*").eq("is_published",true).order("created_at",{ascending:false}),sb.from("gift_items").select("*").eq("is_active",true).order("sort_order").order("created_at")]);document.getElementById("loading").style.display="none";renderPosts(posts.data||[]);items=gifts.data||[];renderFilters();render();}
function renderPosts(posts){document.getElementById("posts").innerHTML=posts.map(p=>`<article class="post"><h3>📌 ${esc(p.title)}</h3><p>${esc(p.body)}</p></article>`).join("");}
function renderFilters(){const cats=[...new Set(items.map(i=>i.category).filter(Boolean))],el=document.getElementById("filters");if(!cats.length){el.style.display="none";return}el.style.display="flex";el.innerHTML=["todos",...cats].map(c=>`<button class="chip ${c===currentFilter?"on":""}" data-c="${esc(c)}">${c==="todos"?"Todos":esc(c)}</button>`).join("");el.querySelectorAll("button").forEach(b=>b.onclick=()=>{currentFilter=b.dataset.c;renderFilters();render();});}
function render(){const list=items.filter(i=>currentFilter==="todos"||i.category===currentFilter);document.getElementById("empty").style.display=list.length?"none":"block";document.getElementById("grid").innerHTML=list.map(i=>{const left=i.slots_total-i.slots_taken,full=left<=0,segs=i.is_group?`<div class="slots">${Array.from({length:i.slots_total},(_,k)=>`<span class="${k<i.slots_taken?"f":""}"></span>`).join("")}</div><div class="small">${full?"Completo 🎉":`${i.slots_taken} de ${i.slots_total} participaciones · quedan ${left}`}</div>`:"";return `<article class="gift ${full?"done":""}">${full?`<div class="ribbon">Reservado</div>`:""}${i.image_url?`<img class="photo" src="${esc(i.image_url)}" alt="" loading="lazy" onerror="this.remove()">`:`<div class="nophoto">🎁</div>`}<div class="body"><h3>${esc(i.title)}</h3>${i.description?`<p class="desc">${esc(i.description)}</p>`:""}<div class="meta">${i.category?`<span class="tag">${esc(i.category)}</span>`:""}${i.is_group?`<span class="tag">Entre varios</span>`:""}${i.price_estimate!=null?`<span class="small">≈ ${Number(i.price_estimate).toLocaleString("es-ES")} €</span>`:""}</div>${i.product_url?`<a class="link" href="${esc(i.product_url)}" target="_blank" rel="noopener">Ver producto ↗</a>`:""}${segs}<button class="reserve" data-id="${i.id}" ${full?"disabled":""}>${full?"Ya reservado":(i.is_group?"Participar":"Reservar")}</button></div></article>`}).join("");document.querySelectorAll(".reserve:not(:disabled)").forEach(b=>b.onclick=()=>openModal(b.dataset.id));}
function openModal(id){currentItem=items.find(i=>i.id===id);if(!currentItem)return;document.getElementById("mTitle").textContent=(currentItem.is_group?"Participar en: ":"Reservar: ")+currentItem.title;const sf=document.getElementById("slotsField"),sel=document.getElementById("fSlots");if(currentItem.is_group){const left=currentItem.slots_total-currentItem.slots_taken;sel.innerHTML=Array.from({length:left},(_,k)=>`<option value="${k+1}">${k+1}</option>`).join("");sf.style.display="block"}else sf.style.display="none";document.getElementById("mMsg").className="msg";document.getElementById("overlay").classList.add("open");}
function closeModal(){document.getElementById("overlay").classList.remove("open");["fName","fContact","fNote"].forEach(id=>document.getElementById(id).value="");}
document.getElementById("btnCancel").onclick=closeModal;document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
document.getElementById("btnConfirm").onclick=async()=>{const msg=document.getElementById("mMsg"),name=document.getElementById("fName").value.trim(),btn=document.getElementById("btnConfirm");if(name.length<2){msg.textContent="Escribe tu nombre, por favor.";msg.className="msg err";return}btn.disabled=true;btn.textContent="Reservando…";const {data,error}=await sb.rpc("gift_reserve",{p_item_id:currentItem.id,p_name:name,p_contact:document.getElementById("fContact").value.trim()||null,p_note:document.getElementById("fNote").value.trim()||null,p_slots:currentItem.is_group?Number(document.getElementById("fSlots").value):1});btn.disabled=false;btn.textContent="Reservar";if(error||!data?.ok){msg.textContent=data?.error||"No se pudo completar la reserva.";msg.className="msg err";await load();return}msg.textContent="¡Reserva confirmada! Gracias 💚";msg.className="msg ok";setTimeout(()=>{closeModal();load();},900);};
load();
</script>
</body>
</html>
